<section
  id="hero-section"
  class="hero-section"
  aria-label="Seção inicial"
>
  <div class="hero-section-content">
    <h1 class="hero-section__title">
      Seu direito ao auxílio<br>
      maternidade começa aqui
    </h1>

    <p class="hero-section__paragraph">
      Advogada especializada em auxílio-maternidade com anos de experiência defendendo mulheres.<br>
      Orientação clara e segura para garantir seus direitos previdenciários.
    </p>

    <div class="hero-section-ctas">
      <app-button
        label="Consultar"
        ariaLabel="Consultar"
        title="Consultar"
      />

      <app-button
        label="Saiba mais"
        ariaLabel="Saiba mais"
        title="Saiba mais"
        [variant]="ButtonVariant.SECONDARY"
      />
    </div>
  </div>
</section>
