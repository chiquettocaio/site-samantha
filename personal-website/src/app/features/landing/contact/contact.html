<section
  id="contact-section"
  class="contact-section"
>
  <strong class="contact-section__identifier"> Contato </strong>
  <h2 class="contact-section__title"> Entre em contato </h2>
  <p class="contact-section__subtitle">
    <span class="gsap-highlight" [style]="'--x: -200px; --color: #ffadc7'">Estou à disposição</span> para esclarecer dúvidas.
  </p>

  <div class="contact-section__content">
    <div class="contact-subsection contact-subsection--email">
      <app-icon
        class="contact-subsection__icon"
        name="phosphorEnvelopeSimple"
        ariaLabel="Email"
      />

      <h3 class="contact-subsection__title"> Email </h3>
      <p class="contact-subsection__subtitle"> Envie sua mensagem </p>

      <a
        href="mailto:samanthacristine@gmail.com"
        class="contact-subsection__content"
      > samanthacristine@gmail.com </a>
    </div>

    <div class="contact-subsection contact-subsection--phone">
      <app-icon
        class="contact-subsection__icon"
        name="phosphorPhone"
        ariaLabel="Telefone"
      />

      <h3 class="contact-subsection__title"> Telefone </h3>
      <p class="contact-subsection__subtitle"> Ligue ou envie chame no WhatsApp </p>

      <a
        class="contact-subsection__content"
        href="https://wa.me/5512981384125?text=Olá Dra Samantha, gostaria que você avaliasse meu caso, podemos conversar?"
        target="_blank"
      > (12) 9 8138-4125 </a>
    </div>

    <div class="contact-subsection contact-subsection--location">
      <app-icon
        class="contact-subsection__icon"
        name="phosphorHeadset"
        ariaLabel="Ponto no mapa"
      />

      <h3 class="contact-subsection__title"> Atendimento </h3>
      <p class="contact-subsection__subtitle">
        Atendimento presencial em Caraguatatuba e região, <span class="line-break"> e on-line em todo o Brasil </span>
      </p>
    </div>

    <div class="contact-section__image"></div>
  </div>
</section>
