<button
  [class.secondary]="variant() === buttonVariant.SECONDARY"
  [class.tertiary]="variant() === buttonVariant.TERTIARY"
  [type]="type()"
  (click)="clicked.emit()"
  [ariaLabel]="ariaLabel()"
>
  <ng-content select="[ButtonLeadingIcon]" />
  {{ label() }}
  <ng-content select="[ButtonTrailingIcon]"/>
</button>
